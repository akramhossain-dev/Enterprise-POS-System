# ─────────────────────────────────────────────
# Enterprise POS System — Docker Compose
# Local Development Environment
# ─────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: enterprise_pos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pos_user -d enterprise_pos']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pos-network

  # ── Redis Cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: enterprise-pos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6380:6379' # Use 6380 on host to avoid conflict with local Redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pos-network

  # ── Fastify API ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: enterprise-pos-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_NAME: Enterprise POS API
      DATABASE_URL: postgresql://pos_user:pos_password@postgres:5432/enterprise_pos
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos-network

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  pos-network:
    driver: bridge
