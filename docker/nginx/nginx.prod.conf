# ─────────────────────────────────────────────────────────────────────────────
# Enterprise POS System — Nginx Production Configuration
# Routes:  / → web (Next.js :3000)
#         /api/ → api (Fastify :4000)
# ─────────────────────────────────────────────────────────────────────────────

upstream web_upstream {
    server web:3000;
    keepalive 32;
}

upstream api_upstream {
    server api:4000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (uncomment when SSL is configured) ──────────────────
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name _;

    # ── SSL (uncomment and configure when certificates are ready) ────────────
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_prefer_server_ciphers off;
    # ssl_session_timeout 1d;
    # ssl_session_cache   shared:SSL:10m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # Uncomment when HTTPS is active:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # ── Client limits ────────────────────────────────────────────────────────
    client_max_body_size 20m;

    # ── API routes (/api/* → Fastify backend) ────────────────────────────────
    location /api/ {
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Next.js static assets (long cache, immutable) ────────────────────────
    location /_next/static/ {
        proxy_pass         http://web_upstream;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── All other routes → Next.js frontend ──────────────────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
