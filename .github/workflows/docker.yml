name: Docker — Build & Push Images

on:
  workflow_run:
    workflows: ['CI — Quality Gate']
    types: [completed]
    branches: [main]
  # Allow manual trigger for hot-patching
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false # Never cancel Docker builds mid-push

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Only run if CI passed (when triggered by workflow_run)
  # ───────────────────────────────────────────────────────────────────────────
  check-ci:
    name: Check CI Result
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Check if CI passed
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "CI did not pass — skipping Docker build"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH API IMAGE
  # ───────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
      security-events: write # Trivy SARIF upload
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push API image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: production
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          provenance: true
          sbom: true

      - name: Scan API image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/api:latest
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api.sarif'
          category: 'trivy-api'

  # ───────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH WEB IMAGE
  # ───────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Web image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Web image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: docker/web.Dockerfile
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: runner
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          provenance: true
          sbom: true

      - name: Scan Web image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/web:latest
          format: 'sarif'
          output: 'trivy-web.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-web.sarif'
          category: 'trivy-web'

  # ───────────────────────────────────────────────────────────────────────────
  # NOTIFY on build failure
  # ───────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify Build Failure
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: failure()
    steps:
      - name: Notify Discord (optional)
        if: vars.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ vars.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Docker Build Failed",
                "description": "Repository: **${{ github.repository }}**\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`",
                "color": 15158332,
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }'
