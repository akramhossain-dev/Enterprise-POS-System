name: CI — Quality Gate

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE SETUP STEPS
# Each job self-installs — avoids fragile cross-job node_modules cache sharing.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: LINT (ESLint + Prettier)
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @enterprise-pos/api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Lint API (ESLint)
        run: pnpm --filter @enterprise-pos/api lint

      - name: Lint API (Prettier)
        run: pnpm --filter @enterprise-pos/api exec prettier --check "src/**/*.ts"

      - name: Lint Web (ESLint / Next.js)
        run: pnpm --filter @enterprise-pos/web lint:check

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: TYPE CHECK
  # ───────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @enterprise-pos/api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Type check API
        run: pnpm --filter @enterprise-pos/api type-check

      - name: Type check Web
        run: pnpm --filter @enterprise-pos/web type-check

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: SECURITY — Dependency Audit
  # ───────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit API dependencies
        run: cd apps/api && pnpm audit --audit-level=high --prod
        continue-on-error: false

      - name: Audit Web dependencies
        run: cd apps/web && pnpm audit --audit-level=high --prod
        continue-on-error: false

      # Detect accidentally committed secrets
      - name: Secret detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # optional for public repos

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: TESTS (API + Web — run in parallel matrix)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            filter: '@enterprise-pos/api'
            coverage-path: apps/api/coverage/
          - app: web
            filter: '@enterprise-pos/web'
            coverage-path: apps/web/coverage/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (API only)
        if: matrix.app == 'api'
        run: pnpm --filter @enterprise-pos/api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests with coverage
        run: pnpm --filter ${{ matrix.filter }} test:coverage
        env:
          NODE_ENV: test
          CI: true
          # API test env vars (ignored by web)
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          REFRESH_TOKEN_SECRET: ci-test-refresh-secret-that-is-at-least-32-characters
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          FRONTEND_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.app }}
          path: ${{ matrix.coverage-path }}
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5: BUILD (waits for all quality gates)
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            filter: '@enterprise-pos/api'
            artifact-name: api-build
            artifact-path: apps/api/dist/
          - app: web
            filter: '@enterprise-pos/web'
            artifact-name: web-build
            artifact-path: apps/web/.next/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (API only)
        if: matrix.app == 'api'
        run: pnpm --filter @enterprise-pos/api prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.filter }} build
        env:
          # Used by Next.js build — falls back to localhost for CI
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7
